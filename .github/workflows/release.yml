name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: The tag to release.
        required: true

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Prepare NodeJS
        id: prepare-nodejs
        uses: ./
      - name: Install Dependencies
        run: npm ci
      - name: Create the Release
        uses: chrisgavin/build-javascript-action-action@ed1400906eb2296f76e805183d1e76c4d4752a4e # 0.0.5
        with:
          tag: ${{ github.event.inputs.tag }}
